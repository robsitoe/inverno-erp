<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Ícones Material Symbols</title>

    <!-- Material Symbols Outlined Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .test-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .icon-item:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 48px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
            margin-bottom: 10px;
        }

        .icon-name {
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="test-container">
        <h1>🔍 Teste de Ícones Material Symbols</h1>

        <div id="status" class="status"></div>

        <p>Se você vê os ícones abaixo corretamente, significa que o Material Symbols está funcionando:</p>

        <div class="icon-grid">
            <div class="icon-item">
                <span class="material-symbols-outlined">payments</span>
                <span class="icon-name">payments</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">save</span>
                <span class="icon-name">save</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">add_circle</span>
                <span class="icon-name">add_circle</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">print</span>
                <span class="icon-name">print</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">refresh</span>
                <span class="icon-name">refresh</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">search</span>
                <span class="icon-name">search</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">help</span>
                <span class="icon-name">help</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">close</span>
                <span class="icon-name">close</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">logout</span>
                <span class="icon-name">logout</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">edit</span>
                <span class="icon-name">edit</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">delete</span>
                <span class="icon-name">delete</span>
            </div>

            <div class="icon-item">
                <span class="material-symbols-outlined">check</span>
                <span class="icon-name">check</span>
            </div>
        </div>
    </div>

    <script>
        // Verificar se a fonte foi carregada
        document.fonts.ready.then(function () {
            const statusDiv = document.getElementById('status');
            const fonts = Array.from(document.fonts.values());
            const materialFont = fonts.find(f => f.family.includes('Material Symbols'));

            if (materialFont && materialFont.status === 'loaded') {
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ Fonte Material Symbols carregada com sucesso!';
            } else {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Erro: Fonte Material Symbols não foi carregada. Verifique sua conexão com a internet.';
            }
        });
    </script>
</body>

</html>
